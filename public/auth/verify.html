<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NebulaNet — Verify Email</title>
    <style>
      body {
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          Arial;
        background: #0b0f1a;
        color: #fff;
        margin: 0;
      }
      .wrap {
        max-width: 520px;
        margin: 0 auto;
        padding: 40px 20px;
      }
      .card {
        background: #121a2b;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 16px;
        padding: 22px;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 22px;
      }
      p {
        margin: 8px 0;
        color: rgba(255, 255, 255, 0.8);
        line-height: 1.4;
      }
      .btn {
        display: inline-block;
        margin-top: 14px;
        background: #6d8bff;
        color: #0b0f1a;
        padding: 12px 16px;
        border-radius: 12px;
        text-decoration: none;
        font-weight: 700;
      }
      .muted {
        font-size: 13px;
        color: rgba(255, 255, 255, 0.65);
      }
      .ok {
        color: #34d399;
        font-weight: 700;
      }
      .bad {
        color: #fb7185;
        font-weight: 700;
      }
      code {
        background: rgba(255, 255, 255, 0.06);
        padding: 2px 6px;
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>Email verification</h1>
        <p id="status" class="muted">Processing…</p>

        <a
          id="openApp"
          class="btn"
          href="nebulanet://auth/login"
          style="display: none"
        >
          Open NebulaNet
        </a>

        <p class="muted" style="margin-top: 14px">
          If nothing happens, return to the app and log in again.
        </p>
      </div>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
      import {
        getAuth,
        applyActionCode,
        checkActionCode,
      } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

      const firebaseConfig = {
        apiKey: "AIzaSyCld45HfLvQHTY7FpPXhwUIE5docgd5nv0",
        authDomain: "nebulanet-abf99.firebaseapp.com",
        projectId: "nebulanet-abf99",
        storageBucket: "nebulanet-abf99.firebasestorage.app",
        messagingSenderId: "218927734181",
        appId: "1:218927734181:web:4ef20e8f3eca46da3d1c4c",
        measurementId: "G-2QLTHPBWSP",
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);

      const statusEl = document.getElementById("status");
      const openAppBtn = document.getElementById("openApp");

      const params = new URLSearchParams(window.location.search);
      const mode = params.get("mode"); // verifyEmail
      const oobCode = params.get("oobCode"); // action code
      const continueUrl = params.get("continueUrl"); // optional
      const lang = params.get("lang") || "en";

      const showOpenApp = () => {
        openAppBtn.style.display = "inline-block";
        // Try auto open after a moment (mobile)
        setTimeout(() => {
          window.location.href = "nebulanet://auth/login";
        }, 1200);
      };

      (async () => {
        try {
          if (mode !== "verifyEmail" || !oobCode) {
            statusEl.innerHTML = `<span class="bad">Invalid verification link.</span>`;
            showOpenApp();
            return;
          }

          await checkActionCode(auth, oobCode);
          await applyActionCode(auth, oobCode);

          statusEl.innerHTML = `<span class="ok">✅ Email verified successfully.</span>`;
          showOpenApp();
        } catch (e) {
          console.error(e);
          statusEl.innerHTML = `<span class="bad">Verification failed or link expired.</span>`;
          showOpenApp();
        }
      })();
    </script>
  </body>
</html>
