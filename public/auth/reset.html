<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NebulaNet — Reset Password</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Instrument+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --p: #7c3aed;
        --p2: #a78bfa;
        --pk: #ec4899;
        --bg: #08050f;
        --bg2: #0f0a1e;
        --t: #f0ecf8;
        --m: #7b6fa0;
        --m2: #5a5175;
        --err: #fb7185;
        --ok: #34d399;
      }

      body {
        font-family: "Instrument Sans", sans-serif;
        background: var(--bg);
        color: var(--t);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        overflow: hidden;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background:
          radial-gradient(
            ellipse at 60% 20%,
            rgba(124, 58, 237, 0.22) 0%,
            transparent 55%
          ),
          radial-gradient(
            ellipse at 20% 80%,
            rgba(236, 72, 153, 0.1) 0%,
            transparent 50%
          );
        pointer-events: none;
      }

      body::after {
        content: "";
        position: fixed;
        inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
        pointer-events: none;
        opacity: 0.3;
      }

      .card {
        position: relative;
        z-index: 1;
        background: var(--bg2);
        border: 1px solid rgba(124, 58, 237, 0.2);
        border-radius: 20px;
        padding: 48px 40px;
        max-width: 440px;
        width: 100%;
        animation: slideUp 0.5s ease forwards;
      }

      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .logo {
        font-family: "Bebas Neue", sans-serif;
        font-size: 20px;
        letter-spacing: 3px;
        color: var(--m);
        margin-bottom: 32px;
        display: block;
        text-align: center;
      }

      h1 {
        font-family: "Bebas Neue", sans-serif;
        font-size: 30px;
        letter-spacing: 1px;
        margin-bottom: 8px;
      }

      .desc {
        font-size: 14px;
        color: var(--m);
        line-height: 1.6;
        margin-bottom: 28px;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 6px;
        margin-bottom: 16px;
      }

      label {
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.8px;
        text-transform: uppercase;
        color: var(--m);
      }

      input[type="password"] {
        background: rgba(124, 58, 237, 0.08);
        border: 1px solid rgba(124, 58, 237, 0.2);
        border-radius: 10px;
        padding: 13px 16px;
        font-family: inherit;
        font-size: 15px;
        color: var(--t);
        outline: none;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
        width: 100%;
      }
      input[type="password"]:focus {
        border-color: var(--p2);
        box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.15);
      }
      input[type="password"]::placeholder {
        color: var(--m2);
      }

      .field-err {
        font-size: 12px;
        color: var(--err);
        min-height: 18px;
      }

      .requirements {
        background: rgba(124, 58, 237, 0.06);
        border: 1px solid rgba(124, 58, 237, 0.12);
        border-radius: 10px;
        padding: 14px 16px;
        margin-bottom: 20px;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .req {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        color: var(--m);
        transition: color 0.2s;
      }
      .req.met {
        color: var(--ok);
      }
      .req-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--m2);
        flex-shrink: 0;
        transition: background 0.2s;
      }
      .req.met .req-dot {
        background: var(--ok);
      }

      .btn {
        width: 100%;
        background: var(--p);
        color: #fff;
        border: none;
        padding: 14px;
        border-radius: 10px;
        font-family: inherit;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        margin-top: 4px;
      }
      .btn:hover:not(:disabled) {
        transform: translateY(-2px);
        box-shadow: 0 12px 32px rgba(124, 58, 237, 0.4);
      }
      .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      /* success / error state */
      .result {
        text-align: center;
        display: none;
      }
      .result.visible {
        display: block;
      }

      .result-icon {
        width: 64px;
        height: 64px;
        border-radius: 16px;
        margin: 0 auto 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
      }
      .result-icon.ok {
        background: rgba(52, 211, 153, 0.12);
        border: 1px solid rgba(52, 211, 153, 0.3);
      }
      .result-icon.err {
        background: rgba(251, 113, 133, 0.12);
        border: 1px solid rgba(251, 113, 133, 0.3);
      }

      .result h1 {
        margin-bottom: 10px;
      }

      .result p {
        font-size: 14px;
        color: var(--m);
        line-height: 1.6;
        margin-bottom: 24px;
      }

      .open-app {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: var(--p);
        color: #fff;
        text-decoration: none;
        padding: 14px 28px;
        border-radius: 10px;
        font-size: 14px;
        font-weight: 600;
        transition: all 0.2s;
      }
      .open-app:hover {
        transform: translateY(-2px);
        box-shadow: 0 12px 32px rgba(124, 58, 237, 0.4);
      }

      .global-err {
        background: rgba(251, 113, 133, 0.1);
        border: 1px solid rgba(251, 113, 133, 0.25);
        border-radius: 10px;
        padding: 12px 16px;
        font-size: 13px;
        color: var(--err);
        line-height: 1.5;
        margin-bottom: 20px;
        display: none;
      }
      .global-err.visible {
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <span class="logo">NEBULANET</span>

      <!-- Form state -->
      <div id="formState">
        <h1>Reset password</h1>
        <p class="desc">Enter a new password for your NebulaNet account.</p>

        <div class="global-err" id="globalErr"></div>

        <div class="requirements">
          <div class="req" id="reqLen">
            <div class="req-dot"></div>
            At least 8 characters
          </div>
          <div class="req" id="reqUpper">
            <div class="req-dot"></div>
            One uppercase letter
          </div>
          <div class="req" id="reqNum">
            <div class="req-dot"></div>
            One number
          </div>
        </div>

        <div class="field">
          <label for="pw">New password</label>
          <input
            type="password"
            id="pw"
            placeholder="••••••••"
            autocomplete="new-password"
          />
          <span class="field-err" id="pwErr"></span>
        </div>

        <div class="field">
          <label for="pw2">Confirm password</label>
          <input
            type="password"
            id="pw2"
            placeholder="••••••••"
            autocomplete="new-password"
          />
          <span class="field-err" id="pw2Err"></span>
        </div>

        <button class="btn" id="submitBtn" disabled>Set new password</button>
      </div>

      <!-- Result state -->
      <div class="result" id="resultState">
        <div class="result-icon ok" id="resultIcon">✅</div>
        <h1 id="resultHeading">Password updated!</h1>
        <p id="resultMsg">
          Your password has been changed. You can now log in to NebulaNet with
          your new password.
        </p>
        <a href="nebulanet://auth/login" class="open-app">Open NebulaNet →</a>
      </div>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
      import {
        getAuth,
        verifyPasswordResetCode,
        confirmPasswordReset,
      } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

      const firebaseConfig = {
        apiKey: "AIzaSyDeKS_hBGoQvA3nllFC5hJJdoQWP7HgcwA",
        authDomain: "nebulanet-production.firebaseapp.com",
        projectId: "nebulanet-production",
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);

      const params = new URLSearchParams(window.location.search);
      const mode = params.get("mode");
      const oobCode = params.get("oobCode");

      const pw = document.getElementById("pw");
      const pw2 = document.getElementById("pw2");
      const pwErr = document.getElementById("pwErr");
      const pw2Err = document.getElementById("pw2Err");
      const submitBtn = document.getElementById("submitBtn");
      const globalErr = document.getElementById("globalErr");
      const formState = document.getElementById("formState");
      const resultState = document.getElementById("resultState");
      const resultIcon = document.getElementById("resultIcon");
      const resultHeading = document.getElementById("resultHeading");
      const resultMsg = document.getElementById("resultMsg");

      const reqLen = document.getElementById("reqLen");
      const reqUpper = document.getElementById("reqUpper");
      const reqNum = document.getElementById("reqNum");

      // Invalid link check
      if (mode !== "resetPassword" || !oobCode) {
        formState.style.display = "none";
        resultIcon.className = "result-icon err";
        resultIcon.textContent = "✗";
        resultHeading.textContent = "Invalid link";
        resultHeading.style.color = "#fb7185";
        resultMsg.textContent =
          "This password reset link is invalid or has expired. Request a new one from the app.";
        resultState.classList.add("visible");
      }

      function validate() {
        const val = pw.value;
        const hasLen = val.length >= 8;
        const hasUpper = /[A-Z]/.test(val);
        const hasNum = /[0-9]/.test(val);

        reqLen.classList.toggle("met", hasLen);
        reqUpper.classList.toggle("met", hasUpper);
        reqNum.classList.toggle("met", hasNum);

        const pwOk = hasLen && hasUpper && hasNum;
        const matchOk = pw2.value === "" || pw.value === pw2.value;

        if (pw2.value && pw.value !== pw2.value) {
          pw2Err.textContent = "Passwords do not match";
        } else {
          pw2Err.textContent = "";
        }

        submitBtn.disabled = !(
          pwOk &&
          pw.value === pw2.value &&
          pw2.value.length > 0
        );
      }

      pw.addEventListener("input", validate);
      pw2.addEventListener("input", validate);

      submitBtn.addEventListener("click", async () => {
        submitBtn.disabled = true;
        submitBtn.textContent = "Updating…";
        globalErr.classList.remove("visible");

        try {
          await verifyPasswordResetCode(auth, oobCode);
          await confirmPasswordReset(auth, oobCode, pw.value);

          formState.style.display = "none";
          resultState.classList.add("visible");

          setTimeout(() => {
            window.location.href = "nebulanet://auth/login";
          }, 2000);
        } catch (err) {
          console.error(err);
          submitBtn.disabled = false;
          submitBtn.textContent = "Set new password";

          if (err.code === "auth/invalid-action-code") {
            globalErr.textContent =
              "This reset link has expired or already been used. Request a new one from the app.";
          } else if (err.code === "auth/weak-password") {
            globalErr.textContent =
              "Password is too weak. Please choose a stronger password.";
          } else {
            globalErr.textContent = "Something went wrong. Please try again.";
          }
          globalErr.classList.add("visible");
        }
      });
    </script>
  </body>
</html>
